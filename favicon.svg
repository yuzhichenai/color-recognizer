<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e84020"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#ringGrad)" stroke-width="4" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Dropper body -->
  <rect x="58" y="20" width="10" height="36" rx="3" fill="url(#dropGrad)" transform="rotate(40 63 38)" opacity="0.9"/>

  <!-- Dropper needle -->
  <line x1="32" y1="68" x2="42" y2="58" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dropper tip -->
  <circle cx="30" cy="70" r="6" fill="#00e5ff"/>

  <!-- Color swatch circle center -->
  <circle cx="65" cy="60" r="8" fill="#ff6b35"/>
  <circle cx="65" cy="60" r="5" fill="#00e5ff"/>
  <circle cx="65" cy="60" r="2" fill="#fff"/>
</svg>
