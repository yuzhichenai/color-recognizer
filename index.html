<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜色识别器</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-mark">🎨</span>
        <span class="logo-text">颜色识别器</span>
        <span class="logo-badge">v1.2.0</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span class="status-text" id="status">就绪</span>
      </div>
    </header>

    <main class="main">
      <div class="canvas-area">
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="mainCanvas"></canvas>
          <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
                <circle cx="24" cy="28" r="4" fill="currentColor" opacity="0.6"/>
                <circle cx="40" cy="26" r="6" fill="currentColor" opacity="0.4"/>
                <circle cx="32" cy="38" r="8" fill="currentColor" opacity="0.3"/>
                <path d="M8 44 L22 30 L30 38 L44 24 L56 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p class="placeholder-text">拖拽图片到此处</p>
            <p class="placeholder-hint">或点击「上传」按钮 · 支持 JPG / PNG / GIF / WebP</p>
            <div class="placeholder-shortcuts">
              <span class="shortcut"><kbd>Ctrl+V</kbd> 粘贴</span>
              <span class="shortcut"><kbd>+</kbd><kbd>-</kbd> 缩放</span>
              <span class="shortcut"><kbd>C</kbd> 复制色号</span>
              <span class="shortcut"><kbd>双击</kbd> 重置缩放</span>
            </div>
          </div>
          <div class="color-tooltip" id="colorTooltip" hidden>
            <span class="tooltip-swatch" id="tooltipSwatch"></span>
            <span class="tooltip-hex" id="tooltipHex">#000000</span>
          </div>
          <div class="zoom-label" id="zoomLabel" hidden></div>
          <div class="magnifier" id="magnifier" hidden>
            <canvas id="magnifierCanvas"></canvas>
            <div class="magnifier-info">
              <span class="magnifier-hex" id="magnifierHex"></span>
              <span class="magnifier-coord" id="magnifierCoord"></span>
            </div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <section class="panel-section color-section">
          <div class="color-showcase">
            <div class="color-ring" id="colorSwatch">
              <span class="swatch-hex" id="swatchHex">?</span>
              <svg class="ring-deco" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>
                <circle cx="60" cy="60" r="46" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
              </svg>
            </div>
            <div class="color-details">
              <div class="color-value-group" id="colorHexGroup">
                <span class="color-label" id="formatLabel">HEX</span>
                <span class="color-value mono" id="hexValue">------</span>
              </div>
              <div class="color-value-group" id="colorRgbGroup">
                <span class="color-label">&nbsp;</span>
                <span class="color-value mono" id="rgbValue">---, ---, ---</span>
              </div>
              <div class="color-name" id="colorName" hidden>
                <span class="color-name-label">🏷️</span>
                <span class="color-name-value" id="colorNameValue"></span>
              </div>
              <button class="btn-copy" id="copyBtn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <rect x="3" y="5" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M5 5V3.5A1.5 1.5 0 0 1 6.5 2h5A1.5 1.5 0 0 1 13 3.5V11" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                <span class="btn-text">复制色号</span>
              </button>
            </div>
          </div>
        </section>

        <section class="panel-section history-section">
          <div class="section-header">
            <h3 class="panel-title">取色记录</h3>
            <span class="section-badge" id="historyCount">0/20</span>
          </div>
          <div class="history-list" id="historyList">
            <p class="empty-hint">暂无记录</p>
          </div>
          <button class="btn-clear hidden" id="clearHistoryBtn">清空全部</button>
        </section>
      </aside>
    </main>

    <footer class="bottombar">
      <div class="bottombar-left">
        <div class="mode-switch">
          <button class="mode-btn active" data-mode="click">
            <span class="mode-indicator"></span>
            点击取色
          </button>
          <button class="mode-btn" data-mode="region">
            <span class="mode-indicator"></span>
            区域取色
          </button>
        </div>
      </div>
      <div class="bottombar-right">
        <label class="btn-action" id="uploadBtn">
          <input type="file" id="fileInput" accept="image/*" hidden>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v10M3 7l5-5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12v1.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          上传
        </label>
        <button class="btn-action" id="pasteBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="1" width="10" height="14" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M6 1V2.5A.5.5 0 0 0 6.5 3h3a.5.5 0 0 0 .5-.5V1" stroke="currentColor" stroke-width="1.2"/>
            <path d="M5 7h6M5 9.5h4M5 12h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          粘贴
        </button>
      </div>
    </footer>
  </div>

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-content">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M24 6v30M9 21l15-15 15 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 36v4.5A4.5 4.5 0 0 0 10.5 45h27a4.5 4.5 0 0 0 4.5-4.5V36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <p>释放鼠标上传图片</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
